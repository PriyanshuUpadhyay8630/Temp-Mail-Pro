<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Mail Pro</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #messages { margin-top: 20px; text-align: left; }
        .email-box { font-weight: bold; color: #007bff; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Temp Mail Pro</h2>
    <p>Apna temporary email yahan dekhein:</p>
    <div id="email-display" class="email-box">Email generate ho raha hai...</div>
    <button onclick="checkInbox()">Inbox Check Karein</button>
    <div id="messages"></div>
</div>

<script>
    let currentEmail = "";
    const proxy = "https://corsproxy.io/?"; // Yeh network error fix karega
    const apiBase = "https://www.1secmail.com/api/v1/";

    // Random Email Generate Karna
    async function generateEmail() {
        try {
            const res = await fetch(`${proxy}${apiBase}?action=genAddrs&count=1`);
            const data = await res.json();
            currentEmail = data[0];
            document.getElementById('email-display').innerText = currentEmail;
        } catch (err) {
            document.getElementById('email-display').innerText = "Error! Refresh karein.";
        }
    }

    // Inbox Check Karna
    async function checkInbox() {
        if (!currentEmail) return;
        const [user, domain] = currentEmail.split('@');
        const url = `${proxy}${apiBase}?action=getMessages&login=${user}&domain=${domain}`;
        
        try {
            const res = await fetch(url);
            const emails = await res.json();
            let html = "<h3>Messages:</h3>";
            
            if (emails.length === 0) {
                html += "<p>Abhi koi mail nahi aaya hai...</p>";
            } else {
                emails.forEach(e => {
                    html += `<div style="border-bottom:1px solid #ddd; padding:5px;">
                                <b>From:</b> ${e.from}<br>
                                <b>Subject:</b> ${e.subject}
                             </div>`;
                });
            }
            document.getElementById('messages').innerHTML = html;
        } catch (err) {
            alert("Error checking inbox!");
        }
    }

    generateEmail();
</script>

</body>
</html>
