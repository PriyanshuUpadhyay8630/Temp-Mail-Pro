<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Mail Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #eef2f3; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        .email-box { font-size: 1.2rem; font-weight: bold; color: #007bff; background: #f8f9fa; padding: 15px; border: 2px dashed #007bff; border-radius: 10px; margin: 20px 0; word-break: break-all; }
        button { padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; width: 100%; margin-top: 10px; }
        button:hover { background: #218838; }
        #messages { margin-top: 30px; text-align: left; }
        .mail-item { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Temp Mail Pro</h2>
    <p>Aapka Temporary Email Address:</p>
    <div id="email-display" class="email-box">Generating...</div>
    <button onclick="checkInbox()">📩 Inbox Check Karein</button>
    <button onclick="location.reload()" style="background: #6c757d;">🔄 Naya Email Banayein</button>
    <div id="messages"></div>
</div>

<script>
    let currentEmail = "";
    // Multiple proxy options to avoid "Network Error"
    const proxyList = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://thingproxy.freeboard.io/fetch/"
    ];
    let currentProxy = proxyList[0];

    const apiBase = "https://www.1secmail.com/api/v1/";

    async function generateEmail() {
        const display = document.getElementById('email-display');
        try {
            const res = await fetch(`${currentProxy}${apiBase}?action=genAddrs&count=1`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            currentEmail = data[0];
            display.innerText = currentEmail;
        } catch (err) {
            console.log("Proxy failed, trying next...");
            currentProxy = proxyList[1]; // Switch proxy if first fails
            display.innerText = "Connecting... (Retry)";
            setTimeout(generateEmail, 1000);
        }
    }

    async function checkInbox() {
        if (!currentEmail) return;
        const [user, domain] = currentEmail.split('@');
        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML = "<p>Checking for new mails...</p>";

        try {
            const res = await fetch(`${currentProxy}${apiBase}?action=getMessages&login=${user}&domain=${domain}`);
            const emails = await res.json();
            
            if (emails.length === 0) {
                msgDiv.innerHTML = "<p style='color:orange;'>Abhi koi mail nahi aaya hai. Wait karein...</p>";
            } else {
                let html = "<h3>Inbox:</h3>";
                emails.forEach(e => {
                    html += `<div class="mail-item">
                                <strong>From:</strong> ${e.from}<br>
                                <strong>Subject:</strong> ${e.subject}
                             </div>`;
                });
                msgDiv.innerHTML = html;
            }
        } catch (err) {
            msgDiv.innerHTML = "<p style='color:red;'>Error fetching mail. Try again later.</p>";
        }
    }

    generateEmail();
</script>

</body>
</html>
